---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
 name: git-example
 namespace: default
spec:
 interval: 5m
 url: https://github.com/chameleoncg/k8s-training-student-resources
 ref:
   branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
 name: git-example
 namespace: default
spec:
 interval: 10m
 targetNamespace: default
 sourceRef:
   kind: GitRepository
   name: git-example
 path: "./k8s-training-student-resources/Day_3/Lesson_4_flux_argocd/manifests/git-kustomization"
 prune: true
 timeout: 1m
