---
apiVersion: v1
kind: Pod
metadata:
  name: gitops-lab-pod
  namespace: default
  labels:
    app: lab
spec:
  containers:
  - name: web-app
    image: nginx:latest
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-lab-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: lab
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30081
