# RBAC Lab - RoleBinding: grant lab-viewer access to secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-secrets-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: lab-viewer
  namespace: default
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
