# Network Policy Lab - Step 1: Default deny all ingress to server pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      role: server
  policyTypes:
  - Ingress
  # No ingress rules = deny ALL ingress to pods with role=server
