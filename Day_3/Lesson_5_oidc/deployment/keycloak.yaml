            - --hostname=${UPSTREAM_KEYCLOAK_URL}
            - --hostname-backchannel-dynamic=true
            - --proxy-headers=xforwarded
            - --import-realm
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: admin-username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: admin-password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          ports:
            - containerPort: ${PORT}
              name: http
          startupProbe:
            httpGet:
              path: /realms/master
              port: http
            periodSeconds: 10
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: upstream-keycloak-realm-import
---
apiVersion: v1
kind: Service
metadata:
  name: upstream-keycloak
  namespace: oidc
spec:
  selector:
    app: upstream-keycloak
  ports:
    - name: http
      port: ${PORT}
      targetPort: http
