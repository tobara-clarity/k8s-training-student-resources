fullnameOverride: keycloak

auth:
  adminUser: admin
  adminPassword: admin123admin

production: false
proxyHeaders: xforwarded
hostnameStrict: false
httpEnabled: true
extraStartupArgs: >-
  --hostname=${KEYCLOAK_URL}
  --hostname-backchannel-dynamic=true

extraEnvVars:
  - name: KC_HEALTH_ENABLED
    value: "true"
  - name: KC_METRICS_ENABLED
    value: "true"

containerPorts:
  http: 8080

service:
  http:
    enabled: true
  ports:
    http: 8080

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 1
    memory: 1Gi

keycloakConfigCli:
  enabled: true
  cleanupAfterFinished:
    enabled: true
  configuration:
    training-realm.json: |
      {
        "realm": "training",
        "enabled": true,
        "displayName": "OIDC Training",
        "loginWithEmailAllowed": true,
        "duplicateEmailsAllowed": false,
        "rememberMe": true,
        "registrationAllowed": false
      }
