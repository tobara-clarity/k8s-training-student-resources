apiVersion: v1
kind: Namespace
metadata:
  name: obscurity-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: obscurity-pod
  namespace: obscurity-demo
  labels:
    app: web
spec:
  containers:
  - name: caddy
    image: caddy:alpine
    command: ["caddy", "file-server", "--root", "/usr/share/caddy", "--templates", "--access-log"]
    env:
    - name: CREATED_VIA
      value: "Kubernetes Manifest"
    ports:
    - containerPort: 80
    volumeMounts:
    - name: web-storage
      mountPath: /usr/share/caddy
  volumes:
  - name: web-storage
    persistentVolumeClaim:
      claimName: web-content-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: obscurity-demo
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: web-content-pv
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadOnlyMany
  hostPath:
    path: "/mnt/data"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-content-pvc
  namespace: obscurity-demo
spec:
  storageClassName: manual
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Gi
